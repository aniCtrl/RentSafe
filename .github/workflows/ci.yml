name: RentSafe CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  rust-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Downgrade incompatible ed25519-dalek package
        run: |
          cargo update -p ed25519-dalek@3.0.0 --precise 2.2.3 || true
          cargo update -p ed25519-dalek --precise 2.2.3 || true

      - name: Run Contract Tests
        run: cargo test

      - name: Compile Contracts to WASM
        run: cargo build --target wasm32-unknown-unknown --release

  frontend-dapp:
    name: Lint & Test Next.js DApp
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Run ESLint Linting
        run: |
          cd frontend
          npm run lint

      - name: Run Vitest Unit Tests
        run: |
          cd frontend
          npm run test
